#cloud-config

hostname: mininet-example
timezone: Europe/London

package_update: true
package_upgrade: true

packages:
  - git
  - curl
  - build-essential
  - python3
  - python3-pip
  - pkg-config
  - libssl-dev
  - net-tools
  - iproute2
  - tcpdump
  - openvswitch-switch
  - traceroute

runcmd:
  # Rust
  - su - ubuntu -c "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y"
  - echo 'source $HOME/.cargo/env' >> /home/ubuntu/.bashrc

  # Mininet
  - git clone https://github.com/mininet/mininet.git /opt/mininet
  - DEBIAN_FRONTEND=noninteractive /opt/mininet/util/install.sh -nfv

  # Paris Traceroute
  - apt update
  - apt upgrade -y
  - apt install -y autoconf build-essential git libtool
  - mkdir -p /home/ubuntu/git
  - cd /home/ubuntu/git
  - git clone https://github.com/libparistraceroute/libparistraceroute.git
  - cd /home/ubuntu/git/libparistraceroute
  - mkdir -p m4
  - ./autogen.sh
  - ./configure
  - make -j2
  - make install
  - ldconfig
