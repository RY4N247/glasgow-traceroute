#cloud-config

hostname: mininet-example
timezone: Europe/London

package_update: true
package_upgrade: true

packages:
  - git
  - curl
  - build-essential
  - python3
  - python3-pip
  - pkg-config
  - libssl-dev
  - net-tools
  - iproute2
  - tcpdump
  - openvswitch-switch
  - traceroute
  # FRR build dependencies
  - autoconf
  - automake
  - libtool
  - libreadline-dev
  - texinfo
  - libpam0g-dev
  - libjson-c-dev
  - bison
  - flex
  - libc-ares-dev
  - python3-dev
  - python3-sphinx
  - install-info
  - libsnmp-dev
  - perl
  - libcap-dev
  - libelf-dev
  - libunwind-dev
  - protobuf-c-compiler
  - libprotobuf-c-dev
  - python3-pytest
  - libyang2-dev

runcmd:
  # Rust
  - su - ubuntu -c "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y"
  - echo 'source $HOME/.cargo/env' >> /home/ubuntu/.bashrc

  # Mininet
  - git clone https://github.com/mininet/mininet.git /opt/mininet
  - DEBIAN_FRONTEND=noninteractive /opt/mininet/util/install.sh -nfv

  # Paris Traceroute
  - apt update
  - apt upgrade -y
  - apt install -y autoconf build-essential git libtool
  - mkdir -p /home/ubuntu/git
  - cd /home/ubuntu/git
  - git clone https://github.com/libparistraceroute/libparistraceroute.git
  - cd /home/ubuntu/git/libparistraceroute
  - mkdir -p m4
  - ./autogen.sh
  - ./configure
  - make -j2
  - make install
  - ldconfig

  # FRR Installation
  # Create FRR user and groups
  - groupadd -r -g 92 frr
  - groupadd -r -g 85 frrvty
  - adduser --system --ingroup frr --home /var/run/frr/ --gecos "FRR suite" --shell /sbin/nologin frr
  - usermod -a -G frrvty frr

  # Get FRR 9.1 source code
  - cd /home/ubuntu/git
  - git clone https://github.com/FRRouting/frr.git
  - cd /home/ubuntu/git/frr
  - git checkout stable/9.1

  # Update the build system
  - cd /home/ubuntu/git/frr
  - ./bootstrap.sh

  # Compile and install
  - cd /home/ubuntu/git/frr
  - './configure --prefix=/usr --includedir=\${prefix}/include --bindir=\${prefix}/bin --sbindir=\${prefix}/lib/frr --libdir=\${prefix}/lib/frr --libexecdir=\${prefix}/lib/frr --sysconfdir=/etc/frr --localstatedir=/var/frr --with-moduledir=\${prefix}/lib/frr/modules --enable-configfile-mask=0640 --enable-logfile-mask=0640 --enable-snmp=agentx --enable-multipath=64 --enable-user=frr --enable-group=frr --enable-vty-group=frrvty --with-pkg-git-version --with-pkg-extra-version=-MyCustomFRR'
  - make -j2
  - make install
  
  # Install FRR configuration files
  - cd /home/ubuntu/git/frr
  - install -m 775 -o frr -g frr -d /var/frr
  - install -m 775 -o frr -g frr -d /var/log/frr
  - install -m 775 -o frr -g frrvty -d /etc/frr
  - install -m 640 -o frr -g frrvty tools/etc/frr/vtysh.conf /etc/frr/vtysh.conf
  - install -m 640 -o frr -g frr tools/etc/frr/frr.conf /etc/frr/frr.conf
  - install -m 640 -o frr -g frr tools/etc/frr/daemons.conf /etc/frr/daemons.conf
  - install -m 640 -o frr -g frr tools/etc/frr/daemons /etc/frr/daemons

  # Glasgow Traceroute
  - cd /home/ubuntu/git
  - git clone https://gitlab.cis.strath.ac.uk/rnb22136/glasgow-traceroute.git
  
  # Mininet FRR Examples
  - cd /home/ubuntu/git
  - git clone https://github.com/jmwanderer/mininet_frr.git
  
  # Fix ownership
  - chown -R ubuntu:ubuntu /home/ubuntu/git
